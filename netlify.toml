# Netlify Configuration File

[build]
  # Directory to publish (where index.html and assets live)
  publish = "public"

  # Build command (none needed - GitHub Action generates files)
  command = ""

  # Skip the deploy when a commit ONLY changed the daily data files.
  # lake_data.json + lake_chart.png + firesmoke_data.json are read live from
  # GitHub raw by their pages, so they don't need a Netlify rebuild to go live.
  # `git diff --quiet` exits 0 (cancel build) when nothing else changed.
  #
  # Compare the tip commit against its PARENT (HEAD~1), NOT $CACHED_COMMIT_REF.
  # Netlify sets $CACHED_COMMIT_REF to the last *successful* deploy -- but when
  # there is none, it equals $COMMIT_REF, so `git diff <X> <X>` is always empty
  # and cancels EVERY build (a deadlock: no build ever succeeds to populate the
  # cache). HEAD~1..HEAD has no such dependency. If HEAD~1 is missing (shallow
  # clone), we build to be safe.
  ignore = "git rev-parse HEAD~1 >/dev/null 2>&1 || exit 1; git diff --quiet HEAD~1 HEAD -- . ':(exclude)public/lake_data.json' ':(exclude)public/lake_chart.png' ':(exclude)public/firesmoke_data.json'"

# Redirect rules - IMPORTANT: Only redirect non-existent files
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false  # ← CRITICAL: Don't force redirect if file exists!

# Headers for better caching and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"
