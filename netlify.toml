# Netlify Configuration File

[build]
  # Directory to publish (where index.html and assets live)
  publish = "public"

  # Build command (none needed - GitHub Action generates files)
  command = ""

  # Skip the deploy when a commit ONLY changed the daily data files.
  # lake_data.json + lake_chart.png + firesmoke_data.json are read live from
  # GitHub raw by their pages, so they don't need a Netlify rebuild to go live.
  # `git diff --quiet` exits 0 (cancel build) when nothing else changed.
  #
  # Guard: if CACHED_COMMIT_REF is empty (no prior *successful* deploy to diff
  # against), always build. Without this, the bare `git diff --quiet "" $REF`
  # degrades to a working-tree-vs-HEAD compare that is always empty, so EVERY
  # build gets cancelled and the site can never deploy again.
  ignore = "[ -z \"$CACHED_COMMIT_REF\" ] && exit 1; git diff --quiet \"$CACHED_COMMIT_REF\" \"$COMMIT_REF\" -- . ':(exclude)public/lake_data.json' ':(exclude)public/lake_chart.png' ':(exclude)public/firesmoke_data.json'"

# Redirect rules - IMPORTANT: Only redirect non-existent files
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
  force = false  # ← CRITICAL: Don't force redirect if file exists!

# Headers for better caching and security
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-XSS-Protection = "1; mode=block"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Cache static assets
[[headers]]
  for = "/*.png"
  [headers.values]
    Cache-Control = "public, max-age=3600"

[[headers]]
  for = "/*.html"
  [headers.values]
    Cache-Control = "public, max-age=300"
